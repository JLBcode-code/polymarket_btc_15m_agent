name: Publish executables to release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to (for example: v0.1.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release files
        run: |
          if [ ! -d releases ]; then
            echo "releases directory not found"
            exit 1
          fi

          if ! find releases -maxdepth 1 -type f ! -name ".*" ! -name ".gitkeep" | grep -q .; then
            echo "no executable files found in releases directory"
            exit 1
          fi

      - name: Ensure target release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${{ inputs.tag }}" --repo "${{ github.repository }}" > /dev/null; then
            echo "release '${{ inputs.tag }}' does not exist; create it first"
            exit 1
          fi

      - name: Upload files to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            releases/*
            !releases/.gitkeep
