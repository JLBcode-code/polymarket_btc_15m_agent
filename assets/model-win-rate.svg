<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Observed model performance comparison</title>
  <desc id="desc">Claude win rate 90 percent and net return plus 30 percent. Gemini win rate 75 percent and net return plus 75 percent.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050c18"/>
      <stop offset=".55" stop-color="#0a1730"/>
      <stop offset="1" stop-color="#101d3e"/>
    </linearGradient>
    <linearGradient id="claude" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10d99a"/>
      <stop offset="1" stop-color="#69f6cb"/>
    </linearGradient>
    <linearGradient id="gemini" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4b82ff"/>
      <stop offset="1" stop-color="#9a8cff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="650" rx="30" fill="url(#background)"/>
  <circle cx="1070" cy="85" r="190" fill="#254782" opacity=".12"/>
  <circle cx="1120" cy="610" r="240" fill="#17315f" opacity=".13"/>

  <text x="70" y="72" fill="#f6f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="750">MODEL PERFORMANCE OVERVIEW</text>
  <text x="70" y="105" fill="#8fa4c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" letter-spacing="2">OBSERVED / USER-PROVIDED BENCHMARK</text>

  <rect x="70" y="145" width="510" height="390" rx="24" fill="#0b1930" stroke="#1d3558"/>
  <rect x="620" y="145" width="510" height="390" rx="24" fill="#0b1930" stroke="#263868"/>

  <circle cx="112" cy="197" r="8" fill="#43edbb" filter="url(#glow)"/>
  <text x="135" y="207" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="29" font-weight="750">Claude</text>
  <text x="540" y="201" text-anchor="end" fill="#7387a7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" letter-spacing="1.5">DIRECTION MODEL</text>

  <text x="105" y="270" fill="#8ea3c3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" letter-spacing="1.3">WIN RATE</text>
  <text x="105" y="340" fill="#65f6cc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="72" font-weight="850">90%</text>
  <rect x="105" y="366" width="430" height="16" rx="8" fill="#152945"/>
  <rect x="105" y="366" width="387" height="16" rx="8" fill="url(#claude)" filter="url(#glow)"/>

  <line x1="105" y1="423" x2="535" y2="423" stroke="#203553"/>
  <text x="105" y="465" fill="#8ea3c3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" letter-spacing="1.3">NET RETURN</text>
  <text x="535" y="477" text-anchor="end" fill="#65f6cc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="52" font-weight="850">+30%</text>

  <circle cx="662" cy="197" r="8" fill="#768fff" filter="url(#glow)"/>
  <text x="685" y="207" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="29" font-weight="750">Gemini</text>
  <text x="1090" y="201" text-anchor="end" fill="#7387a7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" letter-spacing="1.5">COMPARISON MODEL</text>

  <text x="655" y="270" fill="#8ea3c3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" letter-spacing="1.3">WIN RATE</text>
  <text x="655" y="340" fill="#91a5ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="72" font-weight="850">75%</text>
  <rect x="655" y="366" width="430" height="16" rx="8" fill="#152945"/>
  <rect x="655" y="366" width="323" height="16" rx="8" fill="url(#gemini)" filter="url(#glow)"/>

  <line x1="655" y1="423" x2="1085" y2="423" stroke="#203553"/>
  <text x="655" y="465" fill="#8ea3c3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" letter-spacing="1.3">NET RETURN</text>
  <text x="1085" y="477" text-anchor="end" fill="#91a5ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="52" font-weight="850">+75%</text>

  <rect x="70" y="575" width="1060" height="1" fill="#23395c"/>
  <text x="70" y="612" fill="#8095b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">
    Historical observations are not guarantees of future performance. Sample size and methodology are not independently verified.
  </text>
</svg>
