<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Observed model win-rate comparison</title>
  <desc id="desc">Claude 90 percent, Gemini 75 percent</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b1730"/>
      <stop offset="1" stop-color="#101c3d"/>
    </linearGradient>
    <linearGradient id="claude" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#17e3a6"/>
      <stop offset="1" stop-color="#65f6cc"/>
    </linearGradient>
    <linearGradient id="gemini" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4d8dff"/>
      <stop offset="1" stop-color="#8bb8ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="28" fill="url(#background)"/>
  <path d="M0 390 C210 300 340 480 560 380 S920 270 1200 365" fill="none" stroke="#22345c" stroke-width="2" opacity=".5"/>
  <path d="M0 425 C250 340 410 500 650 390 S1000 330 1200 410" fill="none" stroke="#172a4e" stroke-width="2" opacity=".7"/>

  <text x="70" y="78" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="700">MODEL DIRECTION ACCURACY</text>
  <text x="70" y="112" fill="#8fa4c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" letter-spacing="2">OBSERVED / USER-PROVIDED BENCHMARK</text>

  <text x="70" y="190" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="650">Claude</text>
  <rect x="250" y="158" width="800" height="48" rx="14" fill="#132342"/>
  <rect x="250" y="158" width="720" height="48" rx="14" fill="url(#claude)" filter="url(#glow)"/>
  <text x="1080" y="194" text-anchor="end" fill="#65f6cc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="44" font-weight="800">90%</text>

  <text x="70" y="290" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="650">Gemini</text>
  <rect x="250" y="258" width="800" height="48" rx="14" fill="#132342"/>
  <rect x="250" y="258" width="600" height="48" rx="14" fill="url(#gemini)" filter="url(#glow)"/>
  <text x="1080" y="294" text-anchor="end" fill="#8bb8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="44" font-weight="800">75%</text>

  <line x1="250" y1="354" x2="1050" y2="354" stroke="#283b62" stroke-width="1"/>
  <g fill="#7186a9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">
    <text x="250" y="382">0%</text>
    <text x="450" y="382" text-anchor="middle">25%</text>
    <text x="650" y="382" text-anchor="middle">50%</text>
    <text x="850" y="382" text-anchor="middle">75%</text>
    <text x="1050" y="382" text-anchor="end">100%</text>
  </g>

  <rect x="70" y="430" width="1060" height="1" fill="#233759"/>
  <text x="70" y="472" fill="#8095b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">
    Historical observations are not guarantees of future performance. Sample size and methodology are not independently verified.
  </text>
</svg>
